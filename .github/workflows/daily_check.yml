name: NFPC NFTC Daily Check

on:
  schedule:
    # 🕒 KST 오전 10시 17분 (UTC 1:17) - 정각 트래픽 회피!
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nfpc-nftc-daily
  cancel-in-progress: false

jobs:
  run-check:
    runs-on: ubuntu-latest
    env:
      LAWGO_OC: ${{ secrets.LAWGO_OC }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      TZ: Asia/Seoul
      LAWGO_REQUEST_GAP: "2.5"  # <--- 이 훌륭한 안전장치는 무조건 살려둡니다!
      
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate script syntax
        run: python -m py_compile scripts/check_updates.py

      - name: Validate required secret
        shell: bash
        run: |
          if [ -z "$LAWGO_OC" ]; then
            echo "ERROR: LAWGO_OC secret is empty."
            exit 1
          fi

      - name: Run NFPC/NFTC check
        run: python scripts/check_updates.py

      - name: Commit & push (if changed)
        shell: bash
        run: |
          git config user.name "nfpc-nftc-bot"
          git config user.email "bot@users.noreply.github.com"

          if git status --porcelain | grep -E 'data\.json|snapshot\.json' >/dev/null 2>&1; then
            git add data.json snapshot.json
            git commit -m "Daily NFPC/NFTC update check"
            git push
          else
            echo "No data changes"
          fi
